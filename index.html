/* ---------------------- Exportar: CSV y nota PDF -------------------------- */
function toCSV(rows) {
  return rows.map((r) => r.map((x) => `"${String(x == null ? "" : x).replace(/"/g, '""')}"`).join(",")).join("\n");
}
function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1500);
}
function movsToRows(movs, data) {
  const rows = [["Fecha", "Tipo", "Obra", "Proveedor", "Rubro", "Etapa", "Forma de pago", "Cuenta", "Estatus", "Monto", "Descripción"]];
  movs.slice().sort((a, b) => a.fecha.localeCompare(b.fecha)).forEach((m) => {
    const o = data.proyectos.find((x) => x.id === m.proyecto_id);
    const p = data.proveedores.find((x) => x.id === m.proveedor_id);
    const c = data.categorias.find((x) => x.id === m.categoria_id);
    const cta = data.cuentas.find((x) => x.id === m.cuenta_id);
    rows.push([m.fecha, m.tipo, o ? o.nombre : "", p ? p.nombre : "", c ? c.nombre : "", m.etapa || "", m.metodo_pago, cta ? cta.nombre : "", m.estatus, m.monto, (m.descripcion || "").replace(/[\n;]/g, " ")]);
  });
  return rows;
}
function exportMovsCSV(movs, data, nombreArchivo) {
  downloadFile(nombreArchivo, "\ufeff" + toCSV(movsToRows(movs, data)), "text/csv;charset=utf-8;");

// Nota individual de un movimiento en PDF (recibo).
function notaPDF(m, data) {
  const jsPDF = window.jspdf && window.jspdf.jsPDF;
  if (!jsPDF) { alert("No se pudo cargar el generador de PDF. Conéctate a internet una vez y vuelve a intentar."); return; }
  const o = data.proyectos.find((x) => x.id === m.proyecto_id);
  const p = data.proveedores.find((x) => x.id === m.proveedor_id);
  const c = data.categorias.find((x) => x.id === m.categoria_id);
  const cta = data.cuentas.find((x) => x.id === m.cuenta_id);
  const esIngreso = m.tipo === "ingreso";
  const doc = new jsPDF({ unit: "pt", format: "a5" }); // 420 x 595 pt
  const W = 420, mx = 36;
  let y = 54;
  doc.setFont("helvetica", "bold"); doc.setFontSize(16);
  doc.text(esIngreso ? "NOTA DE COBRO" : "NOTA DE PAGO", mx, y);
  doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(120);
  doc.text("Folio " + String(m.id).slice(-8).toUpperCase(), W - mx, y, { align: "right" });
  y += 8; doc.setDrawColor(220); doc.line(mx, y, W - mx, y); y += 26;
  // Monto destacado
  doc.setTextColor(esIngreso ? 5 : 190, esIngreso ? 150 : 30, esIngreso ? 105 : 72);
  doc.setFont("helvetica", "bold"); doc.setFontSize(26);
  doc.text(fmtMXN(m.monto), mx, y); y += 26;
  doc.setTextColor(40); doc.setFontSize(10);
  const rows = [
    ["Fecha", fmtDate(m.fecha)],
    ["Tipo", esIngreso ? "Ingreso (cobro)" : "Egreso (pago)"],
    ["Obra / proyecto", o ? o.nombre : "—"],
    ["Cliente", o ? (o.cliente || "—") : "—"],
    [esIngreso ? "Etapa" : "Proveedor", esIngreso ? (m.etapa || "—") : (p ? p.nombre : "—")],
  ];
  if (!esIngreso) { rows.push(["Concepto / rubro", c ? c.nombre : "—"]); rows.push(["Etapa", m.etapa || "—"]); }
  rows.push(["Forma de pago", m.metodo_pago]);
  rows.push(["Cuenta", cta ? cta.nombre : "—"]);
  rows.push(["Estatus", m.estatus]);
  if (m.descripcion) rows.push(["Nota", m.descripcion]);
  doc.setFont("helvetica", "normal");
  rows.forEach((r) => {
    doc.setTextColor(130); doc.text(r[0], mx, y);
    doc.setTextColor(30); doc.text(String(r[1]), mx + 120, y, { maxWidth: W - mx - (mx + 120) });
    y += 20;
  });
  y += 14; doc.setDrawColor(230); doc.line(mx, y, W - mx, y); y += 18;
  doc.setTextColor(150); doc.setFontSize(8);
  doc.text("Generado por Obras · " + new Date().toLocaleString("es-MX"), mx, y);
  doc.save(`nota_${m.tipo}_${m.fecha}_${String(m.id).slice(-6)}.pdf`);
}

// Comprime una imagen a JPEG/dataURL para guardarla ligera en IndexedDB.
function fileToDataUrl(file, maxW = 1280, quality = 0.7) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        const sc = Math.min(1, maxW / img.width);
        const c = document.createElement("canvas");
        c.width = Math.round(img.width * sc); c.height = Math.round(img.height * sc);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        try { res(c.toDataURL("image/jpeg", quality)); } catch (e) { res(fr.result); }
      };
      img.onerror = () => res(fr.result);
      img.src = fr.result;
    };
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
}

// Nombre de cliente de una obra (entidad clientes, con respaldo al texto libre).
function clienteNombre(obra, data) {
  if (!obra) return "—";
  const c = data.clientes && data.clientes.find((x) => x.id === obra.cliente_id);
  return (c && c.nombre) || obra.cliente || "—";
}

// Flujo de caja proyectado: balance acumulado por semana sumando cobros y restando pagos programados pendientes.
function buildCashflow(saldoInicial, pagos, cobros, semanas = 8) {
  const pts = []; let bal = saldoInicial;
  for (let w = 0; w < semanas; w++) {
    const ini = isoFrom(w * 7), fin = isoFrom((w + 1) * 7);
    const inFlow = cobros.filter((c) => c.estatus === "pendiente" && c.fecha_vencimiento >= ini && c.fecha_vencimiento < fin).reduce((a, c) => a + (Number(c.monto) || 0), 0);
    const outFlow = pagos.filter((p) => p.estatus === "pendiente" && p.fecha_vencimiento >= ini && p.fecha_vencimiento < fin).reduce((a, p) => a + (Number(p.monto) || 0), 0);
    bal += inFlow - outFlow;
    pts.push({ label: "Sem " + (w + 1), balance: Math.round(bal), inFlow, outFlow });
  }
  return pts;
}

  async function _put(s, o) {
    const uid = await currentUserId();
    const row = { id: o.id, user_id: uid, payload: o, updated_at: new Date().toISOString() };

    if (error) throw error;
    return o;

    const { error } = await supabaseClient.from(s).delete().eq("id", id);

  async function ensureSeed() {

    if (cats.length === 0) { const c = buildCatalogs(); for (const k of Object.keys(c)) await _bulk(k, c[k]); }
  }
  // Deja la app EN CERO: borra obras, partidas, movimientos, pagos, cobros, carpetas, clientes y adjuntos.
  // Conserva catálogos: cuentas, categorías y proveedores.
  async function resetZero() {
    const uid = await currentUserId();
    for (const s of ["proyectos","partidas","movimientos","pagos_programados","cobros_programados","carpetas","clientes","adjuntos"]) {
      const { error } = await supabaseClient.from(s).delete().eq("user_id", uid);
      if (error) throw error;
    }
    await ensureSeed();
  }
  // Carga los datos DEMO encima de los catálogos.
  async function loadExample() {
    await resetZero();
    const e = buildExample();
    for (const k of Object.keys(e)) await _bulk(k, e[k]);
  }
  async function wipe() { await _clearAll(); }

  // ---- Respaldo / restauración (paracaídas hasta Supabase) ----
  async function exportAll() {
    const out = { __app: "obras", __version: 3, __exported: new Date().toISOString(), data: {} };
    for (const s of STORES) out.data[s] = await _all(s);
    return out;
  }
  async function importAll(obj) {
    if (!obj || !obj.data) throw new Error("Archivo de respaldo inválido");
    await _clearAll();
    for (const s of STORES) { if (Array.isArray(obj.data[s])) await _bulk(s, obj.data[s]); }
    await ensureSeed();
  }

  // -------- API pública por entidad (async; aquí entraría Supabase) --------
  // Ejemplo Fase 2:
  //   getMovimientos: async () => (await supabase.from('movimientos').select('*')).data
  //   addMovimiento:  async (m) => (await supabase.from('movimientos').insert(m).select().single()).data
  const nameMap = {
    Movimientos: "movimientos", Proveedores: "proveedores", Proyectos: "proyectos",
    Categorias: "categorias", Cuentas: "cuentas", Partidas: "partidas", PagosProgramados: "pagos_programados",
    Carpetas: "carpetas", Clientes: "clientes", CobrosProgramados: "cobros_programados", Adjuntos: "adjuntos",
  };
  const singular = {
    Movimientos: "Movimiento", Proveedores: "Proveedor", Proyectos: "Proyecto",
    Categorias: "Categoria", Cuentas: "Cuenta", Partidas: "Partida", PagosProgramados: "PagoProgramado",
    Carpetas: "Carpeta", Clientes: "Cliente", CobrosProgramados: "CobroProgramado", Adjuntos: "Adjunto",
  };
  const api = {};
  Object.keys(nameMap).forEach((N) => {
    const store = nameMap[N];
    const S = singular[N];
    api[`get${N}`] = () => _all(store);
    api[`add${S}`] = (o) => _put(store, Object.assign({ id: uid(store.slice(0, 3)) }, o));
    api[`update${S}`] = (o) => _put(store, o);
    api[`delete${S}`] = (id) => _del(store, id);
  });
  // Adjuntos de un movimiento (carga perezosa, no entran en el reload general)
  api.getAdjuntosByMov = async (movId) => (await _all("adjuntos")).filter((a) => a.movimiento_id === movId);

  return Object.assign(api, { open, ensureSeed, resetZero, loadExample, wipe, exportAll, importAll });
})();

/* --------------------------- Cálculos derivados --------------------------- */
function useDerived(data) {
  return useMemo(() => {
    const { movimientos, proyectos, partidas, cuentas } = data;
    const pagados = movimientos.filter((m) => m.estatus === "pagado");

    const sum = (arr) => arr.reduce((a, m) => a + (Number(m.monto) || 0), 0);

    const obraStats = {};
    proyectos.forEach((o) => {
      const ing = sum(pagados.filter((m) => m.tipo === "ingreso" && m.proyecto_id === o.id));
      const egr = sum(pagados.filter((m) => m.tipo === "egreso" && m.proyecto_id === o.id));
      const parts = partidas.filter((p) => p.proyecto_id === o.id);
      const presupuestoTotal = parts.reduce((a, p) => a + (Number(p.presupuesto) || 0), 0);
      // Costo proyectado: lo presupuestado, pero si ya pagaste de más en una partida, cuenta lo pagado.
      const costoProyectado = parts.reduce((a, p) => {
        const pag = sum(pagados.filter((m) => m.tipo === "egreso" && m.partida_id === p.id));
        return a + Math.max(Number(p.presupuesto) || 0, pag);
      }, 0);
      const contratado = Number(o.total_contratado) || 0;
      const utilidadProyectada = contratado - costoProyectado;
      obraStats[o.id] = {
        cobrado: ing, pagado: egr, utilidad: ing - egr,
        porCobrar: Math.max(0, contratado - ing),
        avance: contratado ? Math.min(1, ing / contratado) : 0,
        presupuestoTotal, costoProyectado,
        porPagar: Math.max(0, costoProyectado - egr),
        utilidadProyectada,
        margenProyectado: contratado ? utilidadProyectada / contratado : 0,
        margenReal: ing ? (ing - egr) / ing : 0,
      };
    });

    const partidaStats = {};
    partidas.forEach((p) => {
      const pag = sum(pagados.filter((m) => m.tipo === "egreso" && m.partida_id === p.id));
      partidaStats[p.id] = { pagado: pag, diferencial: (Number(p.presupuesto) || 0) - pag };
    });

    const cuentaStats = {};
    cuentas.forEach((c) => {
      const ing = sum(pagados.filter((m) => m.tipo === "ingreso" && m.cuenta_id === c.id));
      const egr = sum(pagados.filter((m) => m.tipo === "egreso" && m.cuenta_id === c.id));
      cuentaStats[c.id] = { saldo: (Number(c.saldo_inicial) || 0) + ing - egr };
    });

    const totalCobrado = sum(pagados.filter((m) => m.tipo === "ingreso"));
    const totalPagado = sum(pagados.filter((m) => m.tipo === "egreso"));
    const utilidadTotal = totalCobrado - totalPagado;
    const saldoTotal = Object.values(cuentaStats).reduce((a, s) => a + s.saldo, 0);
    const contratadoTotal = proyectos.reduce((a, o) => a + (Number(o.total_contratado) || 0), 0);
    const utilidadProyectadaTotal = Object.values(obraStats).reduce((a, s) => a + (s.utilidadProyectada || 0), 0);
    const margenProyectadoGlobal = contratadoTotal ? utilidadProyectadaTotal / contratadoTotal : 0;

    return { obraStats, partidaStats, cuentaStats, totalCobrado, totalPagado, utilidadTotal, saldoTotal, contratadoTotal, utilidadProyectadaTotal, margenProyectadoGlobal };
  }, [data]);
}

function ChartBox({ type, data, options, height = 220, onPick }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current || typeof Chart === "undefined") return;
    inst.current = new Chart(ref.current, {
      type, data,
      options: Object.assign({
        responsive: true, maintainAspectRatio: false,
        onClick: (evt, els) => { if (onPick && els && els.length) onPick(els[0].index); },
      }, options),
    });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data), JSON.stringify(options), type]);
  return <div style={{ height }}><canvas ref={ref} /></div>;
}

            { k: "obras", i: "🏗️", l: "Obras" },
            { k: "movs", i: "↕️", l: "Movs" },
            { k: "pagos", i: "📅", l: "Pagos" },
            { k: "mas", i: "⋯", l: "Más" },
          ].map((t) => (
            <button key={t.k} onClick={() => { setTab(t.k); back(); }}
              className={"py-2.5 flex flex-col items-center gap-0.5 text-[11px] " + (tab === t.k && !route ? "text-indigo-600 dark:text-indigo-400" : "text-zinc-400")}>
              <span className="text-lg">{t.i}</span>{t.l}
            </button>
          ))}
        </div>
      </nav>

      {(showAdd || editMov) && (
        <MovForm ctx={ctx} mov={editMov} onClose={() => { setShowAdd(false); setEditMov(null); }}
          onSave={async (m, fotos) => { await saveMov(m, fotos); setShowAdd(false); setEditMov(null); }} />
      )}

      {showSearch && <SearchOverlay ctx={ctx} onClose={() => setShowSearch(false)} />}

      {updateReady && (
        <div className="fixed left-1/2 -translate-x-1/2 z-50 bg-indigo-600 text-white px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-3 text-sm"
          style={{ bottom: "calc(6.5rem + var(--safe-b))" }}>
          Nueva versión disponible
          <button onClick={() => window.location.reload()} className="font-semibold underline">Actualizar</button>
        </div>
      )}

      {toast && (
        <div className="fixed left-1/2 -translate-x-1/2 z-50 bottom-28 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-3 text-sm"
          style={{ bottom: "calc(6.5rem + var(--safe-b))" }}>
          {toast.msg}
          {toast.undo && <button onClick={toast.undo} className="font-semibold text-indigo-300 dark:text-indigo-600">Deshacer</button>}
        </div>
      )}
    </div>
  );
}

/* ------------------------------- DASHBOARD -------------------------------- */
function Dashboard({ ctx }) {
  const { data, derived, dark, go } = ctx;
  const [periodo, setPeriodo] = useState("6m"); // mes | 6m | todo

  const movFiltered = useMemo(() => {
    const m = data.movimientos.filter((x) => x.estatus === "pagado");
    if (periodo === "todo") return m;
    if (periodo === "mes") { const k = todayISO().slice(0, 7); return m.filter((x) => monthKey(x.fecha) === k); }
    const lim = isoFrom(-183); return m.filter((x) => x.fecha >= lim);
  }, [data.movimientos, periodo]);

  // Utilidad por obra
  const obrasActivas = data.proyectos;
  const utilData = {
    labels: obrasActivas.map((o) => o.nombre),
    datasets: [{
      label: "Utilidad",
      data: obrasActivas.map((o) => derived.obraStats[o.id]?.utilidad || 0),
      backgroundColor: obrasActivas.map((o) => (derived.obraStats[o.id]?.utilidad || 0) >= 0 ? "#059669" : "#E11D48"),
      borderRadius: 8,
    }],
  };
  // Gasto por rubro (egresos del periodo)
  const rubro = {};
  movFiltered.filter((m) => m.tipo === "egreso").forEach((m) => {
    const c = data.categorias.find((c) => c.id === m.categoria_id);
    const key = c ? c.nombre : "Otro";
    rubro[key] = (rubro[key] || 0) + Number(m.monto || 0);
    if (c) rubro["__c_" + key] = c.color;
  });
  const rubroLabels = Object.keys(rubro).filter((k) => !k.startsWith("__c_"));
  const rubroData = {
    labels: rubroLabels,
    datasets: [{ data: rubroLabels.map((k) => rubro[k]), backgroundColor: rubroLabels.map((k) => rubro["__c_" + k] || "#999"), borderWidth: 0 }],
  };
  // Flujo mensual (ing vs egr)
  const months = [];
  for (let i = 5; i >= 0; i--) { const d = new Date(); d.setMonth(d.getMonth() - i); months.push(d.toISOString().slice(0, 7)); }
  const ingByM = months.map((k) => movFiltered.filter((m) => m.tipo === "ingreso" && monthKey(m.fecha) === k).reduce((a, m) => a + Number(m.monto || 0), 0));
  const egrByM = months.map((k) => movFiltered.filter((m) => m.tipo === "egreso" && monthKey(m.fecha) === k).reduce((a, m) => a + Number(m.monto || 0), 0));
  const flujoData = {
    labels: months.map(monthLabel),
    datasets: [
      { label: "Ingresos", data: ingByM, backgroundColor: "#10B981", borderRadius: 6 },
      { label: "Egresos", data: egrByM, backgroundColor: "#F43F5E", borderRadius: 6 },
    ],
  };
  const tick = dark ? "#9CA3AF" : "#6B7280";
  const grid = dark ? "#26272B" : "#ECECEC";
  const baseOpts = (showLegend) => ({
    plugins: {
      legend: { display: showLegend, labels: { color: tick, boxWidth: 10, font: { size: 11 } } },
      tooltip: { callbacks: { label: (c) => (c.dataset.label ? c.dataset.label + ": " : "") + fmtMXN0(c.parsed.y ?? c.parsed) } },
    },
    scales: { x: { ticks: { color: tick, font: { size: 10 } }, grid: { display: false } }, y: { ticks: { color: tick, font: { size: 10 }, callback: (v) => fmtMXN0(v) }, grid: { color: grid } } },
  });

  const sobregiros = data.partidas.filter((p) => (derived.partidaStats[p.id]?.diferencial || 0) < 0);
  const proximos = data.pagos_programados.filter((p) => p.estatus === "pendiente").sort((a, b) => a.fecha_vencimiento.localeCompare(b.fecha_vencimiento));
  const venc7 = proximos.filter((p) => p.fecha_vencimiento <= isoFrom(7));

  // Flujo de caja proyectado (8 semanas)
  const cashflow = buildCashflow(derived.saldoTotal, data.pagos_programados, data.cobros_programados, 8);
  const cashflowData = { labels: cashflow.map((p) => p.label), datasets: [{ label: "Saldo proyectado", data: cashflow.map((p) => p.balance), borderColor: "#4F46E5", backgroundColor: "rgba(79,70,229,0.12)", fill: true, tension: 0.3, pointRadius: 2 }] };
  const minBal = Math.min(0, ...cashflow.map((p) => p.balance));

  return (
    <div>
      <Header title="Inicio" right={<div className="flex items-center gap-3"><button onClick={ctx.openSearch} aria-label="Buscar" className="text-lg">🔎</button><Seg value={periodo} onChange={setPeriodo} options={[{ value: "mes", label: "Mes" }, { value: "6m", label: "6m" }, { value: "todo", label: "Todo" }]} /></div>} />
      <div className="px-4 space-y-4">
        {/* KPIs */}
        <div className="grid grid-cols-2 gap-3">
          <Card className="p-4">
            <p className="text-xs text-zinc-500">Utilidad total</p>
            <p className="text-2xl font-bold mt-1"><Money value={derived.utilidadTotal} sign /></p>
          </Card>
          <Card className="p-4">
            <p className="text-xs text-zinc-500">Saldo en cuentas</p>
            <p className="text-2xl font-bold mt-1 num">{fmtMXN0(derived.saldoTotal)}</p>
          </Card>
          <Card className="p-4">
            <p className="text-xs text-zinc-500">Cobrado</p>
            <p className="text-lg font-semibold mt-1 num text-emerald-600 dark:text-emerald-400">{fmtMXN0(derived.totalCobrado)}</p>
          </Card>
          <Card className="p-4">
            <p className="text-xs text-zinc-500">Pagado</p>
            <p className="text-lg font-semibold mt-1 num text-rose-600 dark:text-rose-400">{fmtMXN0(derived.totalPagado)}</p>
          </Card>
        </div>

        {/* Proyección de utilidad/margen */}
        <Card className="p-4">
          <div className="flex justify-between items-center">
            <div>
              <p className="text-xs text-zinc-500">Utilidad proyectada</p>
              <p className="text-[11px] text-zinc-400">si todo sale a presupuesto</p>
              <p className="text-xl font-bold mt-1"><Money value={derived.utilidadProyectadaTotal} sign /></p>
            </div>
            <div className="text-right">
              <p className="text-xs text-zinc-500">Margen</p>
              <p className={"text-2xl font-bold num " + (derived.margenProyectadoGlobal >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400")}>{Math.round(derived.margenProyectadoGlobal * 100)}%</p>
            </div>
          </div>
        </Card>

        {/* Flujo de caja proyectado */}
        <Card className="p-4">
          <p className="font-semibold mb-1">Flujo de caja proyectado</p>
          <p className="text-xs text-zinc-500 mb-2">Saldo estimado próximas 8 semanas (cobros − pagos programados).</p>
          <ChartBox type="line" data={cashflowData} height={190}
            options={{ plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => fmtMXN0(c.parsed.y) } } }, scales: { x: { ticks: { color: tick, font: { size: 10 } }, grid: { display: false } }, y: { suggestedMin: minBal, ticks: { color: tick, font: { size: 10 }, callback: (v) => fmtMXN0(v) }, grid: { color: grid } } } }} />
          {minBal < 0 && <p className="text-[11px] text-rose-600 dark:text-rose-400 mt-1">⚠️ El saldo proyectado se vuelve negativo. Ojo con la liquidez.</p>}
        </Card>

        {/* Próximos pagos */}
        <Card className="p-4">
          <div className="flex items-center justify-between mb-2">
            <p className="font-semibold">Próximos pagos</p>
            <span className="text-xs text-zinc-500">{venc7.length} en 7 días</span>
          </div>
          {proximos.length === 0 ? <p className="text-sm text-zinc-500">Nada pendiente. 🎉</p> : (
            <div className="space-y-2">
              {proximos.slice(0, 4).map((p) => {
                const prov = data.proveedores.find((x) => x.id === p.proveedor_id);
                const obra = data.proyectos.find((x) => x.id === p.proyecto_id);
                const vencido = p.fecha_vencimiento < todayISO();
                const pronto = !vencido && p.fecha_vencimiento <= isoFrom(7);
                return (
                  <div key={p.id} className="flex items-center justify-between text-sm">
                    <div>
                      <p className="font-medium">{prov?.nombre || "—"} <span className="text-zinc-400 font-normal">· {obra?.nombre}</span></p>
                      <p className={"text-xs " + (vencido ? "text-rose-600 dark:text-rose-400 font-medium" : pronto ? "text-amber-600 dark:text-amber-400" : "text-zinc-500")}>
                        {vencido ? "Vencido " : ""}{fmtDate(p.fecha_vencimiento)}
                      </p>
                    </div>
                    <button onClick={() => ctx.marcarPagado(p)} className="num font-semibold text-right">
                      {fmtMXN0(p.monto)}<span className="block text-[11px] text-indigo-600 dark:text-indigo-400 font-medium">Marcar pagado</span>
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </Card>

        {/* Utilidad por obra */}
        <Card className="p-4">
          <p className="font-semibold mb-2">Utilidad por obra</p>
          <p className="text-xs text-zinc-500 mb-2">Toca una barra para abrir la obra.</p>
          <ChartBox type="bar" data={utilData} options={baseOpts(false)} height={200}
            onPick={(i) => go("obra", obrasActivas[i].id)} />
        </Card>

        <div className="grid gap-4">
          {/* Gasto por rubro */}
          <Card className="p-4">
            <p className="font-semibold mb-2">Gasto por rubro</p>
            {rubroLabels.length ? (
              <ChartBox type="doughnut" data={rubroData} height={220}
                options={{ plugins: { legend: { position: "right", labels: { color: tick, boxWidth: 10, font: { size: 11 } } }, tooltip: { callbacks: { label: (c) => c.label + ": " + fmtMXN0(c.parsed) } } }, cutout: "62%" }} />
            ) : <p className="text-sm text-zinc-500 py-6 text-center">Sin egresos en el periodo.</p>}
          </Card>
          {/* Flujo mensual */}
          <Card className="p-4">
            <p className="font-semibold mb-2">Ingresos vs egresos (6 meses)</p>
            <ChartBox type="bar" data={flujoData} options={baseOpts(true)} height={220} />
          </Card>
        </div>

        {/* Sobregiros */}
        {sobregiros.length > 0 && (
          <Card className="p-4 border-rose-200 dark:border-rose-900/50">
            <p className="font-semibold mb-2 text-rose-600 dark:text-rose-400">⚠️ Partidas sobregiradas</p>
            <div className="space-y-1.5">
              {sobregiros.map((p) => {
                const prov = data.proveedores.find((x) => x.id === p.proveedor_id);
                const obra = data.proyectos.find((x) => x.id === p.proyecto_id);
                return (
                  <div key={p.id} className="flex justify-between text-sm" onClick={() => go("obra", p.proyecto_id)}>
                    <span>{prov?.nombre} · <span className="text-zinc-400">{obra?.nombre}</span></span>
                    <Money value={derived.partidaStats[p.id].diferencial} sign className="text-sm" />
                  </div>
                );
              })}
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

function CarpetaForm({ ctx, carpeta, onClose }) {
  const { data, reload, showToast } = ctx;
  const [f, setF] = useState(carpeta || { nombre: "", color: PROYECTO_COLORS[(data.carpetas.length) % PROYECTO_COLORS.length], archivada: false });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const save = async () => {
    if (!f.nombre) return showToast("Ponle nombre a la carpeta");
    if (f.id) await db.updateCarpeta(f); else await db.addCarpeta({ ...f, creado_en: todayISO() });
    await reload(); onClose(); showToast(f.id ? "Carpeta actualizada" : "Carpeta creada");
  };
  const archivar = async () => { await db.updateCarpeta({ ...f, archivada: !f.archivada }); await reload(); onClose(); showToast(f.archivada ? "Carpeta reactivada" : "Carpeta cerrada"); };
  const del = async () => {
    if (!confirm("¿Borrar la carpeta? Las obras NO se borran, solo se quedan sin carpeta.")) return;
    for (const o of data.proyectos.filter((o) => o.carpeta_id === f.id)) await db.updateProyecto({ ...o, carpeta_id: null });
    await db.deleteCarpeta(f.id); await reload(); onClose(); showToast("Carpeta eliminada");
  };
  return (
    <Sheet open onClose={onClose} title={carpeta ? "Editar carpeta" : "Nueva carpeta"}
      footer={<div className="space-y-2"><Btn onClick={save}>Guardar</Btn>{carpeta && <Btn variant="ghost" onClick={archivar}>{f.archivada ? "Reactivar carpeta" : "Cerrar carpeta (ya no la toco)"}</Btn>}{carpeta && <Btn variant="danger" onClick={del}>Eliminar carpeta</Btn>}</div>}>
      <Field label="Nombre"><TextInput value={f.nombre} onChange={set("nombre")} placeholder="Obras de junio" /></Field>
      <Field label="Color"><div className="flex gap-2 flex-wrap">{PROYECTO_COLORS.map((c) => <button key={c} onClick={() => setF({ ...f, color: c })} className={"w-8 h-8 rounded-full " + (f.color === c ? "ring-2 ring-offset-2 ring-indigo-500 dark:ring-offset-zinc-900" : "")} style={{ backgroundColor: c }} />)}</div></Field>
    </Sheet>
  );
}

function ObraDetail({ ctx, id }) {
  const { data, derived, back, go, dark, reload, showToast, setEditMov } = ctx;
  const obra = data.proyectos.find((o) => o.id === id);
  const [edit, setEdit] = useState(false);
  const [addPartida, setAddPartida] = useState(false);
  if (!obra) return <div className="p-6">Obra no encontrada. <button onClick={back} className="text-indigo-600">Volver</button></div>;
  const s = derived.obraStats[id] || {};
  const cerrada = obra.estatus === "cerrado";
  const partidas = data.partidas.filter((p) => p.proyecto_id === id);
  const movsObra = data.movimientos.filter((m) => m.proyecto_id === id).sort((a, b) => b.fecha.localeCompare(a.fecha));
  const cobros = movsObra.filter((m) => m.tipo === "ingreso");
  const pagadosObra = movsObra.filter((m) => m.estatus === "pagado");
  const egObra = pagadosObra.filter((m) => m.tipo === "egreso");
  const sum = (arr) => arr.reduce((a, m) => a + (Number(m.monto) || 0), 0);
  const efe = sum(egObra.filter((m) => m.metodo_pago === "efectivo"));
  const tra = sum(egObra.filter((m) => m.metodo_pago === "transferencia"));
  const pendObra = data.pagos_programados.filter((p) => p.proyecto_id === id && p.estatus === "pendiente");
  const pendMonto = pendObra.reduce((a, p) => a + (Number(p.monto) || 0), 0);

  // dona: gasto por rubro de la obra
  const rubro = {};
  egObra.forEach((m) => { const c = data.categorias.find((c) => c.id === m.categoria_id); const k = c ? c.nombre : "Otro"; rubro[k] = (rubro[k] || 0) + Number(m.monto || 0); if (c) rubro["__c_" + k] = c.color; });
  const rl = Object.keys(rubro).filter((k) => !k.startsWith("__c_"));
  const donaData = { labels: rl, datasets: [{ data: rl.map((k) => rubro[k]), backgroundColor: rl.map((k) => rubro["__c_" + k] || "#999"), borderWidth: 0 }] };
  const tick = dark ? "#9CA3AF" : "#6B7280";

  const exportObraCSV = () => exportMovsCSV(movsObra, data, `obra_${obra.nombre.replace(/[^\w]+/g, "_")}_${todayISO()}.csv`);
  const toggleEstatus = async () => {
    const next = cerrada ? "activo" : "cerrado";
    if (next === "cerrado" && !confirm("¿Marcar esta obra como terminada? Podrás reactivarla después.")) return;
    await db.updateProyecto(Object.assign({}, obra, { estatus: next }));
    await reload(); showToast(cerrada ? "Obra reactivada" : "Obra terminada ✓");
  };

  return (
    <div>
      <Header title={obra.nombre} onBack={back} right={<button onClick={() => setEdit(true)} className="text-sm text-indigo-600 dark:text-indigo-400">Editar</button>} />
      <div className="px-4 space-y-4">
        {/* ---- Dashboard de la obra ---- */}
        <Card className="p-4">
          <div className="flex justify-between items-baseline">
            <div className="flex items-center gap-2">
              <p className="text-xs text-zinc-500">Utilidad</p>
              {cerrada && <Badge color="#6B7280">Terminada</Badge>}
            </div>
            <Money value={s.utilidad} sign className="text-2xl font-bold" />
          </div>
          {/* % avance de cobro */}
          <div className="mt-3 h-1.5 rounded-full bg-zinc-100 dark:bg-zinc-800 overflow-hidden">
            <div className="h-full rounded-full" style={{ width: ((s.avance || 0) * 100) + "%", backgroundColor: obra.color }} />
          </div>
          <p className="text-[11px] text-zinc-400 mt-1">{Math.round((s.avance || 0) * 100)}% cobrado de {fmtMXN0(obra.total_contratado)}</p>

          <div className="grid grid-cols-2 gap-2 mt-4">
            <div className="rounded-xl bg-zinc-50 dark:bg-zinc-800/50 p-3"><p className="text-[11px] text-zinc-500">Cobrado</p><p className="num font-semibold text-emerald-600 dark:text-emerald-400">{fmtMXN0(s.cobrado)}</p></div>
            <div className="rounded-xl bg-zinc-50 dark:bg-zinc-800/50 p-3"><p className="text-[11px] text-zinc-500">Pagado</p><p className="num font-semibold text-rose-600 dark:text-rose-400">{fmtMXN0(s.pagado)}</p></div>
            <div className="rounded-xl bg-zinc-50 dark:bg-zinc-800/50 p-3"><p className="text-[11px] text-zinc-500">Por cobrar</p><p className="num font-semibold">{fmtMXN0(s.porCobrar)}</p></div>
            <div className="rounded-xl bg-zinc-50 dark:bg-zinc-800/50 p-3"><p className="text-[11px] text-zinc-500">Pendiente por pagar</p><p className="num font-semibold text-amber-600 dark:text-amber-400">{fmtMXN0(pendMonto)}</p></div>
          </div>

          {/* Efectivo vs transferencia (como en tu Excel) */}
          <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex justify-around text-center text-xs">
            <div><p className="text-zinc-500">Pagado en efectivo</p><p className="num font-semibold mt-0.5">{fmtMXN0(efe)}</p></div>
            <div><p className="text-zinc-500">Pagado por transfer.</p><p className="num font-semibold mt-0.5">{fmtMXN0(tra)}</p></div>
          </div>

          {/* Proyección: si todo sale a presupuesto */}
          <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex justify-between items-center">
            <div>
              <p className="text-[11px] text-zinc-500">Utilidad proyectada</p>
              <Money value={s.utilidadProyectada} sign className="font-semibold" />
            </div>
            <div className="text-center">
              <p className="text-[11px] text-zinc-500">Costo proy.</p>
              <p className="num font-semibold text-sm">{fmtMXN0(s.costoProyectado)}</p>
            </div>
            <div className="text-right">
              <p className="text-[11px] text-zinc-500">Margen proy.</p>
              <p className={"num font-bold " + ((s.margenProyectado || 0) >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400")}>{Math.round((s.margenProyectado || 0) * 100)}%</p>
            </div>
          </div>
          <p className="text-[11px] text-zinc-400 mt-1">Cliente: {clienteNombre(obra, data)}</p>

          {(obra.honorarios || obra.indirectos || obra.iva) ? (
            <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 text-xs text-zinc-500 flex gap-4 flex-wrap">
              {obra.honorarios ? <span>Honorarios {fmtMXN0(obra.honorarios)}</span> : null}
              {obra.indirectos ? <span>Indirectos {fmtMXN0(obra.indirectos)}</span> : null}
              {obra.iva ? <span>IVA {fmtMXN0(obra.iva)}</span> : null}
            </div>
          ) : null}
        </Card>

        {/* Acciones */}
        <div className="grid grid-cols-2 gap-2">
          <Btn variant="ghost" onClick={exportObraCSV}>⬇️ CSV de la obra</Btn>
          <Btn variant="ghost" onClick={toggleEstatus}>{cerrada ? "↩︎ Reactivar" : "✓ Marcar terminada"}</Btn>
        </div>

        {obra.notas ? (
          <Card className="p-4">
            <p className="font-semibold mb-1">Bitácora</p>
            <p className="text-sm text-zinc-600 dark:text-zinc-300 whitespace-pre-wrap">{obra.notas}</p>
          </Card>
        ) : null}

        {/* Gasto por rubro de la obra */}
        {rl.length > 0 && (
          <Card className="p-4">
            <p className="font-semibold mb-2">Gasto por rubro</p>
            <ChartBox type="doughnut" data={donaData} height={210}
              options={{ plugins: { legend: { position: "right", labels: { color: tick, boxWidth: 10, font: { size: 11 } } }, tooltip: { callbacks: { label: (c) => c.label + ": " + fmtMXN0(c.parsed) } } }, cutout: "62%" }} />
          </Card>
        )}

        {/* Partidas / proveedores con diferencial */}
        <Card className="p-4">
          <div className="flex items-center justify-between mb-3">
            <p className="font-semibold">Partidas (presupuesto vs pagado)</p>
            <button onClick={() => setAddPartida(true)} className="text-sm text-indigo-600 dark:text-indigo-400">+ Partida</button>
          </div>
          {partidas.length === 0 ? <p className="text-sm text-zinc-500">Sin partidas. Agrega proveedores y su presupuesto.</p> : (
            <div className="space-y-3">
              {partidas.map((p) => {
                const ps = derived.partidaStats[p.id] || {};
                const prov = data.proveedores.find((x) => x.id === p.proveedor_id);
                const cat = data.categorias.find((x) => x.id === p.categoria_id);
                const pct = p.presupuesto ? Math.min(1, (ps.pagado || 0) / p.presupuesto) : 0;
                const over = (ps.diferencial || 0) < 0;
                return (
                  <div key={p.id}>
                    <div className="flex justify-between text-sm">
                      <span className="font-medium">{prov?.nombre} <span className="text-zinc-400 font-normal">· {p.concepto}</span></span>
                      <span className={"num text-xs font-semibold " + (over ? "text-rose-600 dark:text-rose-400" : "text-zinc-500")}>
                        {over ? "Sobregiro " : "Disp. "}{fmtMXN0(Math.abs(ps.diferencial || 0))}
                      </span>
                    </div>
                    <div className="mt-1 h-1.5 rounded-full bg-zinc-100 dark:bg-zinc-800 overflow-hidden">
                      <div className="h-full rounded-full" style={{ width: (pct * 100) + "%", backgroundColor: over ? "#E11D48" : (cat?.color || "#4F46E5") }} />
                    </div>
                    <p className="text-[11px] text-zinc-400 mt-0.5">{fmtMXN0(ps.pagado)} de {fmtMXN0(p.presupuesto)}</p>
                  </div>
                );
              })}
            </div>
          )}
        </Card>

        {/* Cobros por etapa */}
        <Card className="p-4">
          <p className="font-semibold mb-2">Cobros del cliente</p>
          {cobros.length === 0 ? <p className="text-sm text-zinc-500">Sin cobros registrados.</p> : (
            <div className="space-y-1.5">
              {cobros.map((m) => (
                <div key={m.id} className="flex justify-between items-center text-sm">
                  <span className="capitalize">{m.etapa || "cobro"} <span className="text-zinc-400">· {fmtDate(m.fecha)}</span></span>
                  <span className="flex items-center gap-2">
                    <span className="num text-emerald-600 dark:text-emerald-400 font-medium">{fmtMXN0(m.monto)}</span>
                    <button onClick={() => notaPDF(m, data)} className="text-[11px] px-2 py-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 font-medium">PDF</button>
                  </span>
                </div>
              ))}
            </div>
          )}
        </Card>

        {/* Todos los movimientos de la obra */}
        <Card className="p-4">
          <p className="font-semibold mb-2">Movimientos de la obra</p>
          {movsObra.length === 0 ? <p className="text-sm text-zinc-500">Sin movimientos.</p> : (
            <div className="divide-y divide-zinc-100 dark:divide-zinc-800">
              {movsObra.map((m) => {
                const prov = data.proveedores.find((x) => x.id === m.proveedor_id);
                const cat = data.categorias.find((x) => x.id === m.categoria_id);
                return (
                  <div key={m.id} className="flex items-center gap-2 py-2">
                    <div className="flex-1 min-w-0" onClick={() => setEditMov(m)}>
                      <p className="text-sm font-medium truncate">{prov?.nombre || cat?.nombre || (m.tipo === "ingreso" ? "Cobro" : "Egreso")}{m.etapa ? <span className="text-zinc-400 font-normal"> · {m.etapa}</span> : null}</p>
                      <p className="text-[11px] text-zinc-500">{fmtDate(m.fecha)} · {m.metodo_pago}{m.estatus !== "pagado" ? " · " + m.estatus : ""}</p>
                    </div>
                    <span className={"num text-sm font-semibold " + (m.tipo === "ingreso" ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400")}>{m.tipo === "ingreso" ? "+" : "−"}{fmtMXN0(m.monto)}</span>
                    <button onClick={() => notaPDF(m, data)} className="text-[11px] px-2 py-1 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-indigo-600 dark:text-indigo-400 font-medium shrink-0">PDF</button>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>
      {edit && <ObraForm ctx={ctx} obra={obra} onClose={() => setEdit(false)} />}
      {addPartida && <PartidaForm ctx={ctx} proyecto_id={id} onClose={() => setAddPartida(false)} />}
    </div>
  );
}

function ObraForm({ ctx, obra, onClose }) {
  const { reload, showToast, data, back } = ctx;
  const [f, setF] = useState(obra || { nombre: "", cliente: "", cliente_id: "", carpeta_id: "", color: PROYECTO_COLORS[data.proyectos.length % PROYECTO_COLORS.length], estatus: "activo", total_contratado: "", honorarios: "", indirectos: "", iva: "", notas: "" });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const save = async () => {
    if (!f.nombre) return showToast("Ponle nombre a la obra");
    const obj = { ...f, cliente_id: f.cliente_id || null, carpeta_id: f.carpeta_id || null, total_contratado: Number(f.total_contratado) || 0, honorarios: Number(f.honorarios) || 0, indirectos: Number(f.indirectos) || 0, iva: Number(f.iva) || 0 };
    if (obj.id) await db.updateProyecto(obj); else await db.addProyecto({ ...obj, creado_en: todayISO() });
    await reload(); onClose(); showToast(obj.id ? "Obra actualizada" : "Obra creada");
  };
  const del = async () => { if (!confirm("¿Eliminar la obra y sus movimientos quedan huérfanos? Se borra solo la obra.")) return; await db.deleteProyecto(f.id); await reload(); onClose(); back(); showToast("Obra eliminada"); };
  return (
    <Sheet open onClose={onClose} title={obra ? "Editar obra" : "Nueva obra"}
      footer={<div className="space-y-2"><Btn onClick={save}>Guardar</Btn>{obra && <Btn variant="danger" onClick={del}>Eliminar obra</Btn>}</div>}>
      <Field label="Nombre"><TextInput value={f.nombre} onChange={set("nombre")} placeholder="Casa 8 / Pintura" /></Field>
      <Field label="Cliente">
        <Select value={f.cliente_id || ""} onChange={set("cliente_id")}>
          <option value="">— sin cliente / usar texto —</option>
          {data.clientes.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
        </Select>
      </Field>
      {!f.cliente_id && <Field label="Cliente (texto libre)"><TextInput value={f.cliente} onChange={set("cliente")} placeholder="Familia…" /></Field>}
      <Field label="Carpeta">
        <Select value={f.carpeta_id || ""} onChange={set("carpeta_id")}>
          <option value="">— sin carpeta —</option>
          {data.carpetas.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
        </Select>
      </Field>
      <Field label="Total contratado (con IVA)"><TextInput type="number" inputMode="decimal" value={f.total_contratado} onChange={set("total_contratado")} placeholder="0.00" /></Field>
      <div className="grid grid-cols-3 gap-2">
        <Field label="Honorarios"><TextInput type="number" inputMode="decimal" value={f.honorarios} onChange={set("honorarios")} /></Field>
        <Field label="Indirectos"><TextInput type="number" inputMode="decimal" value={f.indirectos} onChange={set("indirectos")} /></Field>
        <Field label="IVA"><TextInput type="number" inputMode="decimal" value={f.iva} onChange={set("iva")} /></Field>
      </div>
      <Field label="Color">
        <div className="flex gap-2 flex-wrap">{PROYECTO_COLORS.map((c) => (
          <button key={c} onClick={() => setF({ ...f, color: c })} className={"w-8 h-8 rounded-full " + (f.color === c ? "ring-2 ring-offset-2 ring-indigo-500 dark:ring-offset-zinc-900" : "")} style={{ backgroundColor: c }} />
        ))}</div>
      </Field>
      <Field label="Estatus">
        <Select value={f.estatus} onChange={set("estatus")}><option value="activo">Activo</option><option value="cerrado">Terminada</option><option value="archivado">Archivado</option></Select>
      </Field>
      <Field label="Bitácora / notas"><textarea value={f.notas || ""} onChange={set("notas")} rows={3} className={inputCls} placeholder="Observaciones de la obra…" /></Field>

/* ----------------------------- MOVIMIENTOS -------------------------------- */
function Movimientos({ ctx }) {
  const { data, setEditMov, removeMov } = ctx;
  const [q, setQ] = useState("");
  const [fProy, setFProy] = useState("");
  const [fTipo, setFTipo] = useState("");
  const [fEstatus, setFEstatus] = useState("");

  const list = useMemo(() => {
    return data.movimientos
      .filter((m) => (!fProy || m.proyecto_id === fProy) && (!fTipo || m.tipo === fTipo) && (!fEstatus || m.estatus === fEstatus))
      .filter((m) => { if (!q) return true; const prov = data.proveedores.find((p) => p.id === m.proveedor_id); const t = (m.descripcion + " " + (prov?.nombre || "") + " " + (m.etapa || "")).toLowerCase(); return t.includes(q.toLowerCase()); })
      .sort((a, b) => b.fecha.localeCompare(a.fecha));
  }, [data, q, fProy, fTipo, fEstatus]);

  return (
    <div>
      <Header title="Movimientos" />
      <div className="px-4 space-y-3">
        <TextInput value={q} onChange={(e) => setQ(e.target.value)} placeholder="Buscar proveedor, concepto…" />
        <div className="flex gap-2 overflow-x-auto pb-1 -mx-4 px-4">
          <Select value={fProy} onChange={(e) => setFProy(e.target.value)}><option value="">Todas las obras</option>{data.proyectos.map((p) => <option key={p.id} value={p.id}>{p.nombre}</option>)}</Select>
          <Select value={fTipo} onChange={(e) => setFTipo(e.target.value)}><option value="">Tipo</option><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></Select>
          <Select value={fEstatus} onChange={(e) => setFEstatus(e.target.value)}><option value="">Estatus</option><option value="pagado">Pagado</option><option value="pendiente">Pendiente</option><option value="programado">Programado</option></Select>
        </div>
        {list.length === 0 ? <Empty title="Sin movimientos" hint="Usa el botón + para registrar uno." /> : (
          <div className="space-y-2">
            {list.map((m) => {
              const obra = data.proyectos.find((o) => o.id === m.proyecto_id);
              const prov = data.proveedores.find((p) => p.id === m.proveedor_id);
              const cat = data.categorias.find((c) => c.id === m.categoria_id);
              return (
                <Card key={m.id} className="p-3 flex items-center gap-3" onClick={() => setEditMov(m)}>
                  <div className="w-9 h-9 rounded-xl grid place-items-center text-lg shrink-0" style={{ backgroundColor: (cat?.color || "#999") + "22" }}>{cat?.icono || (m.tipo === "ingreso" ? "💵" : "💸")}</div>
                  <div className="flex-1 min-w-0">
                    <p className="font-medium truncate">{prov?.nombre || cat?.nombre || (m.tipo === "ingreso" ? "Cobro" : "Egreso")} {m.etapa && <span className="text-zinc-400 font-normal">· {m.etapa}</span>}</p>
                    <p className="text-xs text-zinc-500 truncate">{obra?.nombre} · {fmtDate(m.fecha)}{m.estatus !== "pagado" ? " · " + m.estatus : ""}</p>
                  </div>
                  <span className={"num font-semibold " + (m.tipo === "ingreso" ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400")}>{m.tipo === "ingreso" ? "+" : "−"}{fmtMXN0(m.monto)}</span>
                </Card>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function MovForm({ ctx, mov, onClose, onSave }) {
  const { data, showToast, removeMov } = ctx;
  const lastAcc = (() => { try { return localStorage.getItem("obras_last_acc"); } catch { return null; } })();
  const lastMet = (() => { try { return localStorage.getItem("obras_last_metodo"); } catch { return null; } })();
  const [f, setF] = useState(mov || {
    id: uid("mov"),
    fecha: todayISO(), tipo: "egreso", monto: "", metodo_pago: lastMet || "transferencia",
    cuenta_id: lastAcc || data.cuentas[0]?.id || "", proyecto_id: data.proyectos[0]?.id || "",
    partida_id: "", proveedor_id: "", categoria_id: "", etapa: "avance", descripcion: "", estatus: "pagado", creado_en: todayISO(),
  });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const partidasObra = data.partidas.filter((p) => p.proyecto_id === f.proyecto_id);

  // Adjuntos (fotos/recibos)
  const [fotos, setFotos] = useState([]);   // existentes {id, dataUrl}
  const [nuevas, setNuevas] = useState([]); // dataUrls nuevos pendientes
  const [borrar, setBorrar] = useState([]); // ids existentes a borrar
  const [subiendo, setSubiendo] = useState(false);
  useEffect(() => { (async () => { if (mov) { try { setFotos(await db.getAdjuntosByMov(mov.id)); } catch {} } })(); }, [mov]);
  const onFile = async (e) => {
    const files = Array.from(e.target.files || []); if (!files.length) return;
    setSubiendo(true);
    try { for (const file of files) { const url = await fileToDataUrl(file); setNuevas((n) => [...n, url]); } } catch {}
    setSubiendo(false); if (e.target) e.target.value = "";
  };

  // al elegir partida, autollenar proveedor y categoría
  const onPartida = (e) => {
    const pid = e.target.value;
    const p = data.partidas.find((x) => x.id === pid);
    setF({ ...f, partida_id: pid, proveedor_id: p?.proveedor_id || f.proveedor_id, categoria_id: p?.categoria_id || f.categoria_id });
  };

  const save = () => {
    if (!f.monto || Number(f.monto) <= 0) return showToast("Captura el monto");
    if (!f.proyecto_id) return showToast("Elige la obra");
    const obj = {
      ...f, monto: Number(f.monto),
      partida_id: f.tipo === "egreso" ? (f.partida_id || null) : null,
      proveedor_id: f.tipo === "egreso" ? (f.proveedor_id || null) : null,
      categoria_id: f.categoria_id || (f.tipo === "ingreso" ? "cat_cobro" : null),
      etapa: f.etapa || null,
      creado_en: f.creado_en || todayISO(),
    };
    onSave(obj, { nuevas, borrar });
  };

  return (
    <Sheet open onClose={onClose} title={mov ? "Editar movimiento" : "Nuevo movimiento"}

      <Field label="Fotos / recibos">
        <div className="flex gap-2 flex-wrap">
          {fotos.filter((a) => !borrar.includes(a.id)).map((a) => (
            <div key={a.id} className="relative">
              <img src={a.dataUrl} alt="recibo" className="w-16 h-16 object-cover rounded-lg border border-zinc-200 dark:border-zinc-700" />

            <div key={"n" + i} className="relative">

            </div>

      </Field>
    </Sheet>
  );
}

/* ----------------------------- CALENDARIO --------------------------------- */
function Pagos({ ctx }) {
  const { data, marcarPagado, marcarCobrado } = ctx;
  const [modo, setModo] = useState("pagar"); // pagar | cobrar
  const [showNew, setShowNew] = useState(false);
  const [editItem, setEditItem] = useState(null);

  const pagarPend = data.pagos_programados.filter((p) => p.estatus === "pendiente").sort((a, b) => a.fecha_vencimiento.localeCompare(b.fecha_vencimiento));
  const pagarDone = data.pagos_programados.filter((p) => p.estatus === "pagado").sort((a, b) => b.fecha_vencimiento.localeCompare(a.fecha_vencimiento));
  const cobrarPend = data.cobros_programados.filter((c) => c.estatus === "pendiente").sort((a, b) => a.fecha_vencimiento.localeCompare(b.fecha_vencimiento));
  const cobrarDone = data.cobros_programados.filter((c) => c.estatus === "cobrado").sort((a, b) => b.fecha_vencimiento.localeCompare(a.fecha_vencimiento));

  const rowPago = (p) => {
    const prov = data.proveedores.find((x) => x.id === p.proveedor_id);
    const obra = data.proyectos.find((x) => x.id === p.proyecto_id);
    const vencido = p.estatus === "pendiente" && p.fecha_vencimiento < todayISO();
    const pronto = p.estatus === "pendiente" && !vencido && p.fecha_vencimiento <= isoFrom(7);
    return (
      <Card key={p.id} className="p-3.5 flex items-center justify-between">
        <div className="flex-1 min-w-0" onClick={() => setEditItem(p)}>
          <p className="font-medium truncate">{prov?.nombre || "Pago"} <span className="text-zinc-400 font-normal text-sm">· {obra?.nombre}</span></p>
          <p className={"text-xs " + (vencido ? "text-rose-600 dark:text-rose-400 font-medium" : pronto ? "text-amber-600 dark:text-amber-400" : "text-zinc-500")}>
            {vencido ? "⚠️ Vencido · " : ""}{fmtDate(p.fecha_vencimiento)}{p.recurrencia !== "unica" ? " · " + p.recurrencia : ""}
          </p>
        </div>
        <div className="text-right ml-3 shrink-0">
          <p className="num font-semibold">{fmtMXN0(p.monto)}</p>
          {p.estatus === "pendiente"
            ? <button onClick={() => marcarPagado(p)} className="text-[11px] text-indigo-600 dark:text-indigo-400 font-medium">Marcar pagado</button>
            : <span className="text-[11px] text-emerald-600 dark:text-emerald-400">Pagado</span>}
        </div>
      </Card>
    );
  };
  const rowCobro = (c) => {
    const obra = data.proyectos.find((x) => x.id === c.proyecto_id);
    const vencido = c.estatus === "pendiente" && c.fecha_vencimiento < todayISO();
    const pronto = c.estatus === "pendiente" && !vencido && c.fecha_vencimiento <= isoFrom(7);
    return (
      <Card key={c.id} className="p-3.5 flex items-center justify-between">
        <div className="flex-1 min-w-0" onClick={() => setEditItem(c)}>
          <p className="font-medium truncate">{clienteNombre(obra, data)} <span className="text-zinc-400 font-normal text-sm">· {obra?.nombre}</span></p>
          <p className={"text-xs " + (vencido ? "text-rose-600 dark:text-rose-400 font-medium" : pronto ? "text-amber-600 dark:text-amber-400" : "text-zinc-500")}>
            {vencido ? "⚠️ Vencido · " : ""}{fmtDate(c.fecha_vencimiento)}{c.etapa ? " · " + c.etapa : ""}{c.recurrencia !== "unica" ? " · " + c.recurrencia : ""}
          </p>
        </div>
        <div className="text-right ml-3 shrink-0">
          <p className="num font-semibold">{fmtMXN0(c.monto)}</p>
          {c.estatus === "pendiente"
            ? <button onClick={() => marcarCobrado(c)} className="text-[11px] text-indigo-600 dark:text-indigo-400 font-medium">Marcar cobrado</button>
            : <span className="text-[11px] text-emerald-600 dark:text-emerald-400">Cobrado</span>}
        </div>
      </Card>
    );
  };

  const esPagar = modo === "pagar";
  return (
    <div>
      <Header title="Calendario" right={<button onClick={() => setShowNew(true)} className="text-indigo-600 dark:text-indigo-400 font-medium text-sm">+ Nuevo</button>} />
      <div className="px-4 space-y-3">
        <Seg value={modo} onChange={setModo} options={[{ value: "pagar", label: "Por pagar" }, { value: "cobrar", label: "Por cobrar" }]} />
        {esPagar ? (
          <>
            {pagarPend.length === 0 && pagarDone.length === 0 && <Empty icon="📅" title="Sin pagos programados" hint="Agenda lo que debes a proveedores." action={<Btn onClick={() => setShowNew(true)}>Programar pago</Btn>} />}
            {pagarPend.length > 0 && <p className="text-xs font-medium text-zinc-500 px-1">Pendientes</p>}
            {pagarPend.map(rowPago)}
            {pagarDone.length > 0 && <p className="text-xs font-medium text-zinc-500 px-1 pt-2">Pagados</p>}
            {pagarDone.map(rowPago)}
          </>
        ) : (
          <>
            {cobrarPend.length === 0 && cobrarDone.length === 0 && <Empty icon="💰" title="Sin cobros programados" hint="Agenda los avances y finiquitos que te deben." action={<Btn onClick={() => setShowNew(true)}>Programar cobro</Btn>} />}
            {cobrarPend.length > 0 && <p className="text-xs font-medium text-zinc-500 px-1">Por cobrar</p>}
            {cobrarPend.map(rowCobro)}
            {cobrarDone.length > 0 && <p className="text-xs font-medium text-zinc-500 px-1 pt-2">Cobrados</p>}
            {cobrarDone.map(rowCobro)}
          </>
        )}
      </div>
      {(showNew || editItem) && (esPagar
        ? <PagoForm ctx={ctx} pago={editItem} onClose={() => { setShowNew(false); setEditItem(null); }} />
        : <CobroForm ctx={ctx} cobro={editItem} onClose={() => { setShowNew(false); setEditItem(null); }} />)}
    </div>
  );
}

function PagoForm({ ctx, pago, onClose }) {
  const { data, reload, showToast } = ctx;
  const [f, setF] = useState(pago || { proyecto_id: data.proyectos[0]?.id || "", partida_id: "", proveedor_id: "", monto: "", fecha_vencimiento: isoFrom(7), recurrencia: "unica", estatus: "pendiente", movimiento_id: null });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const partidasObra = data.partidas.filter((p) => p.proyecto_id === f.proyecto_id);
  const onPartida = (e) => { const p = data.partidas.find((x) => x.id === e.target.value); setF({ ...f, partida_id: e.target.value, proveedor_id: p?.proveedor_id || "" }); };
  const save = async () => {
    if (!f.monto || Number(f.monto) <= 0) return showToast("Captura el monto");
    const obj = { ...f, monto: Number(f.monto) };
    if (obj.id) await db.updatePagoProgramado(obj); else await db.addPagoProgramado(obj);
    await reload(); onClose(); showToast(obj.id ? "Pago actualizado" : "Pago programado");
  };
  const del = async () => { await db.deletePagoProgramado(f.id); await reload(); onClose(); showToast("Pago eliminado"); };
  return (
    <Sheet open onClose={onClose} title={pago ? "Editar pago" : "Programar pago"}
      footer={<div className="space-y-2"><Btn onClick={save}>Guardar</Btn>{pago && <Btn variant="danger" onClick={del}>Eliminar</Btn>}</div>}>
      <Field label="Obra"><Select value={f.proyecto_id} onChange={(e) => setF({ ...f, proyecto_id: e.target.value, partida_id: "" })}>{data.proyectos.map((p) => <option key={p.id} value={p.id}>{p.nombre}</option>)}</Select></Field>
      <Field label="Partida (proveedor)"><Select value={f.partida_id} onChange={onPartida}><option value="">— elige —</option>{partidasObra.map((p) => { const prov = data.proveedores.find((x) => x.id === p.proveedor_id); return <option key={p.id} value={p.id}>{prov?.nombre} · {p.concepto}</option>; })}</Select></Field>
      <Field label="Monto"><TextInput type="number" inputMode="decimal" value={f.monto} onChange={set("monto")} placeholder="0.00" /></Field>
      <div className="grid grid-cols-2 gap-2">
        <Field label="Vence"><TextInput type="date" value={f.fecha_vencimiento} onChange={set("fecha_vencimiento")} /></Field>
        <Field label="Recurrencia"><Select value={f.recurrencia} onChange={set("recurrencia")}><option value="unica">Única</option><option value="semanal">Semanal</option><option value="quincenal">Quincenal</option><option value="mensual">Mensual</option></Select></Field>
      </div>
    </Sheet>
  );
}

function Proveedores({ ctx }) {

  const [showNew, setShowNew] = useState(false);
  const totalProv = (id) => data.movimientos.filter((m) => m.proveedor_id === id && m.tipo === "egreso" && m.estatus === "pagado").reduce((a, m) => a + Number(m.monto || 0), 0);
  return (
    <div>
      <Header title="Proveedores" onBack={back} right={<button onClick={() => setShowNew(true)} className="text-indigo-600 dark:text-indigo-400 text-sm font-medium">+ Nuevo</button>} />

function ProveedorDetail({ ctx, id }) {
  const { data, derived, back } = ctx;
  const prov = data.proveedores.find((p) => p.id === id);
  const [edit, setEdit] = useState(false);
  if (!prov) return <div className="p-6">No encontrado. <button onClick={back} className="text-indigo-600">Volver</button></div>;
  const movs = data.movimientos.filter((m) => m.proveedor_id === id && m.estatus === "pagado").sort((a, b) => b.fecha.localeCompare(a.fecha));
  const total = movs.reduce((a, m) => a + Number(m.monto || 0), 0);
  const partidas = data.partidas.filter((p) => p.proveedor_id === id);
  return (
    <div>
      <Header title={prov.nombre} onBack={back} right={<button onClick={() => setEdit(true)} className="text-sm text-indigo-600 dark:text-indigo-400">Editar</button>} />
      <div className="px-4 space-y-4">
        <Card className="p-4"><p className="text-xs text-zinc-500">Total pagado</p><p className="text-2xl font-bold num mt-1">{fmtMXN0(total)}</p>{prov.telefono && <p className="text-sm text-zinc-500 mt-2">📞 {prov.telefono}</p>}</Card>
        <Card className="p-4">
          <p className="font-semibold mb-2">Partidas por obra</p>
          {partidas.length === 0 ? <p className="text-sm text-zinc-500">Sin partidas asignadas.</p> : partidas.map((p) => {
            const obra = data.proyectos.find((o) => o.id === p.proyecto_id); const ps = derived.partidaStats[p.id] || {};
            return <div key={p.id} className="flex justify-between text-sm py-0.5"><span>{obra?.nombre} <span className="text-zinc-400">· {p.concepto}</span></span><Money value={ps.diferencial} sign className="text-xs" /></div>;
          })}
        </Card>
        <Card className="p-4">
          <p className="font-semibold mb-2">Historial de pagos</p>
          {movs.length === 0 ? <p className="text-sm text-zinc-500">Sin pagos.</p> : movs.map((m) => { const o = data.proyectos.find((x) => x.id === m.proyecto_id); return <div key={m.id} className="flex justify-between text-sm py-0.5"><span>{o?.nombre} <span className="text-zinc-400">· {fmtDate(m.fecha)}</span></span><span className="num">{fmtMXN0(m.monto)}</span></div>; })}
        </Card>
      </div>
      {edit && <ProveedorForm ctx={ctx} prov={prov} onClose={() => setEdit(false)} />}
    </div>
  );
}

/* -------------------------------- REPORTES -------------------------------- */
function Reportes({ ctx }) {
  const { data, derived, back } = ctx;
  const exportCSV = () => {
    const rows = [["Fecha", "Tipo", "Obra", "Proveedor", "Rubro", "Etapa", "Forma de pago", "Cuenta", "Estatus", "Monto", "Descripción"]];
    data.movimientos.slice().sort((a, b) => a.fecha.localeCompare(b.fecha)).forEach((m) => {
      const o = data.proyectos.find((x) => x.id === m.proyecto_id);
      const p = data.proveedores.find((x) => x.id === m.proveedor_id);
      const c = data.categorias.find((x) => x.id === m.categoria_id);
      rows.push([m.fecha, m.tipo, o?.nombre || "", p?.nombre || "", c?.nombre || "", m.etapa || "", m.metodo_pago, (data.cuentas.find((x) => x.id === m.cuenta_id) || {}).nombre || "", m.estatus, m.monto, (m.descripcion || "").replace(/[\n;]/g, " ")]);
    });
    const csv = rows.map((r) => r.map((x) => `"${String(x).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `movimientos_${todayISO()}.csv`; a.click();
  };
  const exportXLSX = () => {
    const findN = (arr, id) => (arr.find((x) => x.id === id) || {}).nombre || "";

    // Hoja 1: resumen por obra
    const resumen = data.proyectos.map((o) => {
      const s = derived.obraStats[o.id] || {};
      return {
        Obra: o.nombre, Cliente: o.cliente || "", Estatus: o.estatus || "",
        "Total contratado": o.total_contratado || 0, Honorarios: o.honorarios || 0, Indirectos: o.indirectos || 0,
        Cobrado: s.cobrado || 0, Pagado: s.pagado || 0, Utilidad: s.utilidad || 0,
      };
    });

    // Hoja 2: movimientos detallados (igual que el CSV, pero en Excel)
    const movs = data.movimientos.slice().sort((a, b) => a.fecha.localeCompare(b.fecha)).map((m) => ({
      Fecha: m.fecha, Tipo: m.tipo, Obra: findN(data.proyectos, m.proyecto_id), Proveedor: findN(data.proveedores, m.proveedor_id),
      Rubro: findN(data.categorias, m.categoria_id), Etapa: m.etapa || "", "Forma de pago": m.metodo_pago,
      Cuenta: findN(data.cuentas, m.cuenta_id), Estatus: m.estatus, Monto: m.monto, Descripción: m.descripcion || "",
    }));

    // Hoja 3: por proveedor (total pagado a cada proveedor)
    const porProveedor = {};
    data.movimientos.filter((m) => m.tipo === "egreso" && m.proveedor_id).forEach((m) => {
      const key = m.proveedor_id;
      porProveedor[key] = porProveedor[key] || { Proveedor: findN(data.proveedores, key), "Total pagado": 0, "# Pagos": 0 };
      porProveedor[key]["Total pagado"] += Number(m.monto) || 0;
      porProveedor[key]["# Pagos"] += 1;
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumen), "Resumen por obra");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(movs), "Movimientos");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(Object.values(porProveedor)), "Por proveedor");
    XLSX.writeFile(wb, `reporte_obras_${todayISO()}.xlsx`);
  };

  return (
    <div>
      <Header title="Reportes" onBack={back} />
      <div className="px-4 space-y-4">
        <Card className="p-4">
          <p className="font-semibold mb-3">Resumen por obra</p>
          <div className="space-y-2">
            {data.proyectos.map((o) => { const s = derived.obraStats[o.id] || {}; return (
              <div key={o.id} className="flex justify-between text-sm">
                <span>{o.nombre}</span>
                <span className="num">Util. <Money value={s.utilidad} sign className="text-sm" /></span>
              </div>
            ); })}
            <div className="flex justify-between text-sm font-semibold pt-2 border-t border-zinc-100 dark:border-zinc-800">
              <span>Utilidad total</span><Money value={derived.utilidadTotal} sign className="text-sm" />
            </div>
          </div>
        </Card>
        <Btn onClick={exportXLSX}>📊 Exportar a Excel (.xlsx)</Btn>
        <Btn variant="ghost" onClick={exportCSV}>⬇️ Exportar movimientos a CSV</Btn>
        <p className="text-xs text-zinc-500 text-center">El Excel incluye 3 hojas: resumen por obra, movimientos y total por proveedor.</p>
      </div>
    </div>
  );
}

/* ------------------------------- PIN LOCK --------------------------------- */
function PinLock({ pin, onUnlock }) {
  const [v, setV] = useState("");
  const [err, setErr] = useState(false);
  const press = (d) => {
    const nv = (v + d).slice(0, 8); setV(nv); setErr(false);
    if (nv.length >= pin.length && nv === pin) { setTimeout(onUnlock, 120); }
    else if (nv.length >= pin.length) { setErr(true); setTimeout(() => { setV(""); setErr(false); }, 500); }
  };
  const keys = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "", "0", "⌫"];
  return (
    <div className="min-h-screen grid place-items-center bg-[#FAFAF8] dark:bg-[#0E0F13]" style={{ paddingTop: "var(--safe-t)" }}>
      <div className="w-full max-w-xs px-8 text-center">
        <div className="text-4xl mb-2">🔒</div>
        <p className="font-semibold mb-6">Ingresa tu PIN</p>
        <div className={"flex justify-center gap-3 mb-8 " + (err ? "animate-pulse" : "")}>
          {Array.from({ length: Math.max(pin.length, 4) }).map((_, i) => (
            <span key={i} className={"w-3.5 h-3.5 rounded-full " + (i < v.length ? (err ? "bg-rose-500" : "bg-indigo-600") : "bg-zinc-300 dark:bg-zinc-700")} />
          ))}
        </div>
        <div className="grid grid-cols-3 gap-4">
          {keys.map((k, i) => k === "" ? <span key={i} /> : (
            <button key={i} onClick={() => k === "⌫" ? setV((s) => s.slice(0, -1)) : press(k)}
              className="h-16 rounded-2xl bg-white dark:bg-zinc-800 text-2xl font-medium active:bg-zinc-100 dark:active:bg-zinc-700 shadow-sm">{k}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function LoginScreen({ onLogged }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const entrar = async (e) => {
    e.preventDefault();
    setErr(""); setBusy(true);
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    setBusy(false);
    if (error) { setErr(error.message === "Invalid login credentials" ? "Correo o contraseña incorrectos" : error.message); return; }
    onLogged();
  };

  return (
    <div className="min-h-screen grid place-items-center px-6 bg-zinc-50 dark:bg-[#0b0c0f]">
      <form onSubmit={entrar} className="w-full max-w-xs space-y-4">
        <div className="text-center mb-4">
          <div className="text-3xl mb-1">🏗️</div>
          <h1 className="text-xl font-semibold">Obras</h1>
          <p className="text-sm text-zinc-500">Inicia sesión para ver tus datos</p>
        </div>
        <input type="email" required placeholder="Correo" value={email} onChange={(e) => setEmail(e.target.value)}
          className="w-full rounded-xl border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 px-3 py-2.5 text-sm" />
        <input type="password" required placeholder="Contraseña" value={password} onChange={(e) => setPassword(e.target.value)}
          className="w-full rounded-xl border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 px-3 py-2.5 text-sm" />
        {err && <p className="text-sm text-rose-600">{err}</p>}
        <button disabled={busy} type="submit" className="w-full rounded-xl bg-indigo-600 text-white py-2.5 font-medium disabled:opacity-60">
          {busy ? "Entrando…" : "Entrar"}
        </button>
        <p className="text-xs text-zinc-400 text-center">Tu usuario se crea desde el panel de Supabase (Authentication → Users), no aquí.</p>
      </form>
    </div>
  );
}

function AuthGate() {
  const [session, setSession] = useState(undefined); // undefined = cargando, null = sin sesión

  useEffect(() => {
    supabaseClient.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return <div className="min-h-screen grid place-items-center text-zinc-400"><div className="text-center"><div className="text-3xl mb-2 animate-pulse">$</div>Cargando…</div></div>;
  }
  if (!session) return <LoginScreen onLogged={() => {}} />;
  return <App onLogout={() => supabaseClient.auth.signOut()} />;
}

/* --------------------------------- mount ---------------------------------- */
ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);

/* ----------------------------- registrar SW ------------------------------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      if (reg.waiting && navigator.serviceWorker.controller) window.dispatchEvent(new Event("sw-update"));
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) window.dispatchEvent(new Event("sw-update"));
        });
      });
    }).catch(() => {});
  });
}
  </script>
